version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: testlab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: testlab
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c log_connections=on
      -c log_disconnections=on
      -c log_statement=ddl

volumes:
  pgdata:
