version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: testlab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-testlab}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testlab_local}
      POSTGRES_DB: testlab
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: testlab-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@testlab.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
